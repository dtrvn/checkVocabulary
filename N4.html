<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N4 – Quiz</title>

<style>
    * { box-sizing: border-box; }

    body {
        font-family: Arial, sans-serif;
        background: #f6f7fb;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }

    /* SIDEBAR */
    .sidebar {
        width: 220px;
        background: #ffffff;
        border-right: 2px solid #ddd;
        height: 100vh;
        position: fixed;
        left: -220px;
        top: 0;
        padding: 10px;
        transition: 0.3s ease;
        z-index: 1000;
    }

    .sidebar.open {
        left: 0;
    }

    .sidebar h3 {
        margin-top: 0;
        font-size: 18px;
        color: #333;
    }

    .nav-item {
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
        margin-bottom: 4px;
    }

    .nav-item:hover {
        background: #eef3ff;
    }

    .nav-item.active {
        background: #4a6cf7;
        color: #fff;
        font-weight: bold;
    }

    /* OVERLAY */
    #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        display: none;
        z-index: 900;
    }

    #overlay.show {
        display: block;
    }

    /* CONTENT */
    .content {
        padding: 20px;
        margin-left: 0;
        max-width: 800px;
        margin-inline: auto;
    }

    #menuBtn {
        font-size: 32px;
        cursor: pointer;
        color: #4a6cf7;
        margin-bottom: 10px;
        display: inline-block;
    }

    h1 {
        margin: 10px 0 20px;
        font-size: 24px;
    }

    /* NEW: Change Button (rectangle) */
    .toggle-btn {
        padding: 10px 18px;
        border-radius: 8px;
        border: 2px solid #1aa179;
        background: #1aa179;
        color: #ffffff;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 10px;
        transition: 0.2s;
    }

    .toggle-btn.active {
        background: #ffffff;
        color: #1aa179;
    }

    .question-box {
        background: #eef3ff;
        padding: 20px;
        border-radius: 10px;
        border-left: 6px solid #4a6cf7;
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    .hiragana, .meaning {
        font-size: 18px;
        color: #4a6cf7;
        margin-top: 8px;
        display: none;
    }

    .answers button {
        display: block;
        width: 100%;
        padding: 15px;
        margin-bottom: 10px;
        font-size: 18px;
        border-radius: 10px;
        border: 2px solid #ddd;
        background: white;
        cursor: pointer;
        text-align: left;
    }

    .answers button:hover {
        background: #f0f3ff;
        border-color: #4a6cf7;
    }

    .correct { background: #d4f8d4 !important; border-color: #2ecc71 !important; }
    .wrong   { background: #ffd6d6 !important; border-color: #e74c3c !important; }

    /* NEW: Progress moved down */
    .progress {
        margin: 10px 0;
        font-weight: bold;
        color: #4a6cf7;
        text-align: center;
    }

    #nextBtn {
        width: 100%;
        padding: 15px;
        font-size: 18px;
        background: #4a6cf7;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 10px;
    }

    label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        margin-bottom: 10px;
    }

    /* POPUP */
    .result-popup {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        justify-content: center;
        align-items: center;
        z-index: 2000;
    }

    .result-box {
        background: #fff;
        width: 360px;
        max-width: 90%;
        border-radius: 16px;
        padding: 20px;
        text-align: center;
    }

    .result-summary {
        display: flex;
        gap: 10px;
        margin: 15px 0;
    }

    .stat {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
    }

    .correct-stat { background: #d4f8d4; }
    .wrong-stat   { background: #ffd6d6; }

    .close-btn {
        margin-top: 10px;
        padding: 10px 16px;
        border-radius: 8px;
        border: none;
        background: #4a6cf7;
        color: #fff;
        cursor: pointer;
    }

    @media (min-width: 900px) {
        .content {
            margin-left: 240px;
        }
        #menuBtn {
            display: none;
        }
        .sidebar {
            left: 0;
        }
        #overlay {
            display: none !important;
        }
    }
</style>
</head>

<body>

<div id="overlay"></div>

<div class="sidebar" id="sidebar">
    <h3>Danh sách bài</hh3>
    <div class="nav-item" data-lesson="26">Bài 26</div>
    <div class="nav-item" data-lesson="27">Bài 27</div>
</div>

<div class="content">
    <div id="menuBtn">≡</div>

    <h1 id="title">JLPT N4 – Bài 26</h1>

    <!-- NEW: Change Button -->
    <button id="toggleBtn" class="toggle-btn">Change question</button>

    <label>
        <input type="checkbox" id="showExtra"> Hiển thị Hiragana
    </label>

    <div class="question-box">
        <div id="kanjiText">Câu hỏi sẽ hiện ở đây</div>
        <div class="hiragana" id="hiraText"></div>
        <div class="meaning" id="meaningText"></div>
    </div>

    <div class="answers" id="answers"></div>

    <div class="progress" id="progressText">0 / 0</div>

    <button id="nextBtn">Next</button>
</div>

<div id="resultPopup" class="result-popup">
    <div class="result-box">
        <h2>Kết quả</h2>
        <div class="result-summary">
            <div class="stat correct-stat">
                Đúng: <span id="correctCountText">0</span>
            </div>
            <div class="stat wrong-stat">
                Sai: <span id="wrongCountText">0</span>
            </div>
        </div>
        <div>Tổng số câu: <span id="totalQuestionText">0</span></div>
        <button class="close-btn" id="closeResultBtn">Test Again</button>
    </div>
</div>

<script>
/* DỮ LIỆU */
const lessons = {
  26: [
    ["みます","見ます／診ます","Xem, khám bệnh"],
    ["さがします","探します／捜します","Tìm, tìm kiếm"],
    ["かいます","飼います","Nuôi (động vật)"],
    ["たてます","建てます","Xây dựng"]
  ],
  27: [
    ["ひろいます","拾います","Nhặt lên"],
    ["おくれます","遅れます","Trễ, muộn"],
    ["まにあいます","間に合います","Kịp"],
    ["さんかします","参加します","Tham gia"]
  ]
};

let currentLesson = 26;
let data = lessons[currentLesson];
let used = new Set();
let currentIndex = null;
let correctCount = 0;
let wrongCount = 0;

let answerMode = "meaning"; 

/* SIDEBAR */
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const menuBtn = document.getElementById("menuBtn");

menuBtn.onclick = () => {
    sidebar.classList.add("open");
    overlay.classList.add("show");
};

overlay.onclick = () => {
    sidebar.classList.remove("open");
    overlay.classList.remove("show");
};

document.querySelectorAll(".nav-item").forEach(item => {
    item.addEventListener("click", () => {
        const lesson = Number(item.dataset.lesson);
        document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("active"));
        item.classList.add("active");
        loadLesson(lesson);

        sidebar.classList.remove("open");
        overlay.classList.remove("show");
    });
});

/* QUIZ */
function loadLesson(num) {
    currentLesson = num;
    data = lessons[num] || [];
    used.clear();
    correctCount = 0;
    wrongCount = 0;

    document.getElementById("title").textContent = "JLPT N4 – Bài " + num;
    document.getElementById("progressText").textContent = `0 / ${data.length}`;
    document.getElementById("answers").innerHTML = "";
    document.getElementById("kanjiText").textContent = "Câu hỏi sẽ hiện ở đây";
    document.getElementById("hiraText").style.display = "none";
    document.getElementById("meaningText").style.display = "none";

    if (data.length > 0) nextQuestion();
}

function getRandomQuestion() {
    if (used.size === data.length) {
        showResult();
        return null;
    }

    let idx;
    do {
        idx = Math.floor(Math.random() * data.length);
    } while (used.has(idx));

    used.add(idx);
    document.getElementById("progressText").textContent = `${used.size} / ${data.length}`;
    return idx;
}

function renderQuestion() {
    if (currentIndex === null || !data[currentIndex]) return;

    const [hira, kanji, meaning] = data[currentIndex];

    document.getElementById("kanjiText").textContent = kanji;
    document.getElementById("hiraText").textContent = hira;
    document.getElementById("meaningText").textContent = meaning;

    const showExtra = document.getElementById("showExtra").checked;

    if (answerMode === "meaning") {
        document.getElementById("hiraText").style.display = showExtra ? "block" : "none";
        document.getElementById("meaningText").style.display = "none";
    } else {
        document.getElementById("meaningText").style.display = showExtra ? "block" : "none";
        document.getElementById("hiraText").style.display = "none";
    }

    let correctAnswer = (answerMode === "meaning") ? meaning : hira;

    let answers = [correctAnswer];

    while (answers.length < 4 && answers.length < data.length) {
        const randRow = data[Math.floor(Math.random() * data.length)];
        const randValue = (answerMode === "meaning") ? randRow[2] : randRow[0];

        if (!answers.includes(randValue)) answers.push(randValue);
    }

    answers.sort(() => Math.random() - 0.5);

    const ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    answers.forEach(a => {
        const btn = document.createElement("button");
        btn.textContent = a;
        btn.onclick = () => checkAnswer(btn, a);
        ansDiv.appendChild(btn);
    });
}

function nextQuestion() {
    const idx = getRandomQuestion();
    if (idx === null) return;
    currentIndex = idx;
    renderQuestion();
}

function checkAnswer(btn, answer) {
    const correct = (answerMode === "meaning")
        ? data[currentIndex][2]
        : data[currentIndex][0];

    document.querySelectorAll(".answers button").forEach(b => b.disabled = true);

    if (answer === correct) {
        btn.classList.add("correct");
        correctCount++;
    } else {
        btn.classList.add("wrong");
        wrongCount++;
    }
}

document.getElementById("nextBtn").addEventListener("click", nextQuestion);

/* NEW: Change Button */
const toggleBtn = document.getElementById("toggleBtn");

toggleBtn.addEventListener("click", () => {
    toggleBtn.classList.toggle("active");

    if (toggleBtn.classList.contains("active")) {
        answerMode = "hira";
        document.getElementById("showExtra").nextSibling.textContent = " Hiển thị ý nghĩa";
    } else {
        answerMode = "meaning";
        document.getElementById("showExtra").nextSibling.textContent = " Hiển thị Hiragana";
    }

    renderQuestion();
});

/* CHECKBOX: HIỂN THỊ PHỤ */
document.getElementById("showExtra").addEventListener("change", () => {
    const show = document.getElementById("showExtra").checked;

    if (answerMode === "meaning") {
        document.getElementById("hiraText").style.display = show ? "block" : "none";
        document.getElementById("meaningText").style.display = "none";
    } else {
        document.getElementById("meaningText").style.display = show ? "block" : "none";
        document.getElementById("hiraText").style.display = "none";
    }
});

/* POPUP */
function showResult() {
    document.getElementById("correctCountText").textContent = correctCount;
    document.getElementById("wrongCountText").textContent = wrongCount;
    document.getElementById("totalQuestionText").textContent = data.length;
    document.getElementById("resultPopup").style.display = "flex";
}

document.getElementById("closeResultBtn").addEventListener("click", () => {
    document.getElementById("resultPopup").style.display = "none";

    // NEW: Random lại từ đầu
    used.clear();
    currentIndex = null;
    correctCount = 0;
    wrongCount = 0;

    nextQuestion();
});

/* KHỞI TẠO */
window.onload = () => {
    const first = document.querySelector('.nav-item[data-lesson="26"]');
    if (first) first.classList.add("active");
    loadLesson(26);
};
</script>

</body>
</html>

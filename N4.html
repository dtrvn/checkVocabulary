<html lang="vi">
<head>

<title>JLPT N4 – Bài 26–50 Quiz</title>

<style>
    * { box-sizing: border-box; }

    body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f6f7fb;
        margin: 0;
        padding: 0;
        display: flex;
    }

    /* ============================
       SIDEBAR – PC
    ============================ */
    .sidebar {
        width: 180px;
        background: #ffffff;
        border-right: 2px solid #e0e0e0;
        padding: 8px 0;
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        overflow: hidden;
    }

    .sidebar h3 {
        font-size: 15px;
        margin: 0 0 8px 0;
        padding: 0 12px;
        color: #333;
        font-weight: 600;
    }

    .nav-item {
            min-width: 90px;
            padding-left: 12px;
            padding-right: 12px;
        padding: 3px 12px;
        height: 27px;
        line-height: 22px;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: 0.15s;
        opacity: 0.9;
        border-bottom: 1px solid #e5e5e5;
        white-space: nowrap;
    }

    .nav-item:hover {
        background: #eef3ff;
        opacity: 1;
    }

    .nav-item.active {
        background: #4a6cf7;
        color: white;
        font-weight: 600;
        opacity: 1;
        animation: selectAnim 0.25s ease-out;
    }

    .nav-icon {
        width: 5px;
        height: 5px;
        background: #4a6cf7;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .nav-item.active .nav-icon {
        background: white;
    }

    .nav-label-pc { display: inline; }
    .nav-number { display: inline; }

    @keyframes selectAnim {
        from { transform: translateX(-4px); opacity: 0.3; }
        to   { transform: translateX(0); opacity: 1; }
    }

    /* ============================
       MAIN CONTENT – PC
    ============================ */
    .container {
        width: calc(100% - 200px);
        padding: 40px;
        margin-left: 200px;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    .progress {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 20px;
        color: #4a6cf7;
        text-align: center;
    }

    .question-box {
        padding: 20px;
        background: #eef3ff;
        border-left: 6px solid #4a6cf7;
        border-radius: 10px;
        margin-bottom: 20px;
        animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .kanji {
        font-size: 28px;
        font-weight: 700;
        color: #2c3e50;
        word-wrap: break-word;
    }

    .hiragana {
        font-size: 20px;
        margin-top: 8px;
        color: #4a6cf7;
        display: none;
        word-wrap: break-word;
    }

    .toggle {
        margin-bottom: 20px;
        font-size: 16px;
        display: inline-block;
    }

    /* ANSWERS – PC: 2×2 */
    .answers-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .answer-btn {
        width: 100%;
        padding: 18px;
        font-size: 18px;
        border-radius: 12px;
        border: 2px solid #dce1eb;
        background: white;
        cursor: pointer;
        transition: 0.2s;
        text-align: center;
        word-wrap: break-word;
    }

    .answer-btn:hover {
        background: #f0f3ff;
        border-color: #4a6cf7;
    }

    .correct { background: #d4f8d4 !important; border-color: #2ecc71 !important; }
    .wrong   { background: #ffd6d6 !important; border-color: #e74c3c !important; }

    #nextBtn {
        width: 100%;
        padding: 15px;
        margin-top: 20px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background: #4a6cf7;
        color: white;
        cursor: pointer;
        transition: 0.2s;
    }

    #nextBtn:hover { background: #3b57d6; }

    /* ============================
       POPUP
    ============================ */
    .popup {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.5);
        display: none;
        justify-content: center;
        align-items: center;
    }

    .popup-content {
        background: white;
        padding: 30px;
        width: 400px;
        max-width: 90%;
        border-radius: 16px;
        text-align: center;
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        animation: fadeIn 0.3s ease-out;
    }

    /* ============================
       RESPONSIVE – MOBILE
    ============================ */
    @media (max-width: 768px) {

        body { display: block; }

        /* Sidebar mobile */
        .sidebar {
            width: 90px;
            padding: 6px 0;
        }

        .sidebar h3 {
            font-size: 12px;
            padding: 0 6px;
            text-align: center;
        }

        .nav-item {
            padding: 2px 6px;
            height: 22px;
            line-height: 22px;
            font-size: 12px;
            gap: 4px;
            justify-content: center;
        }

        /* ẨN chữ “Bài” trên mobile */
        .nav-label-pc { display: none; }

        /* Chỉ hiện số */
        .nav-number { display: inline; }

        /* Container mobile */
        .container {
            width: 100%;
            margin-left: 70px;
            padding: 16px;
        }

        h2 { font-size: 18px; margin-bottom: 16px; }
        .progress { font-size: 14px; margin-bottom: 12px; }

        .question-box { padding: 14px; }
        .kanji { font-size: 22px; }
        .hiragana { font-size: 16px; }

        /* ANSWERS MOBILE: 4 dòng */
        .answers-grid {
            grid-template-columns: 1fr !important;
            gap: 8px;
        }

        .answer-btn {
            padding: 12px;
            font-size: 16px;
        }

        #nextBtn {
            padding: 12px;
            font-size: 16px;
        }
    }

.result-popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);justify-content:center;align-items:center;z-index:9999;}
.result-box{background:#fff;width:420px;max-width:90%;border-radius:20px;padding:24px;text-align:center;}
.result-summary{display:flex;gap:12px;margin:20px 0;}
.stat{flex:1;padding:12px;border-radius:12px;}
.correct-stat{background:#98f1d1;}
.wrong-stat{background:#ffc38c;}

</style>

/* ============================
   TẠO DANH SÁCH BÀI 26 → 50
============================ */
const lessonListDiv = document.getElementById("lessonList");

for (let i = 26; i <= 50; i++) {
    const div = document.createElement("div");
    div.className = "nav-item";
    div.innerHTML = `
        <div class="nav-icon"></div>
        <span class="nav-label-pc">Bài </span>
        <span class="nav-number">${i}</span>
    `;
    div.onclick = () => loadLesson(i, div);
    lessonListDiv.appendChild(div);
}

/* ============================
   QUIZ LOGIC
============================ */
let currentLesson = 26;
let data = lessons[currentLesson] || [];
let total = data.length;
let used = new Set();
let currentIndex = null;
let correctCount = 0;
let wrongCount = 0;

function loadLesson(num, element) {
    currentLesson = num;

    document.querySelectorAll(".nav-item").forEach(btn => btn.classList.remove("active"));
    element.classList.add("active");

    data = lessons[num] || [];
    total = data.length;

    used.clear();
    correctCount = 0;
    wrongCount = 0;

    document.getElementById("title").textContent = "JLPT N4 – Bài " + num;
    document.getElementById("progressText").textContent = `0 / ${total}`;

    updateQuestion();
}

function toggleHiragana() {
    document.getElementById("hiraText").style.display =
        document.getElementById("showHira").checked ? "block" : "none";
}

function getRandomQuestion() {
    if (used.size === total) {
        showResult();
        return null;
    }

    let idx;
    do {
        idx = Math.floor(Math.random() * total);
    } while (used.has(idx));

    used.add(idx);
    document.getElementById("progressText").textContent = `${used.size} / ${total}`;
    return idx;
}

function updateQuestion() {
    if (total === 0) {
        document.getElementById("kanjiText").textContent = "Chưa có dữ liệu bài này";
        document.getElementById("hiraText").textContent = "";
        document.getElementById("answers").innerHTML = "";
        return;
    }

    currentIndex = getRandomQuestion();
    if (currentIndex === null) return;

    const [hira, kanji] = data[currentIndex];
    const displayWord = kanji.trim() !== "" ? kanji : hira;

    document.getElementById("kanjiText").textContent = displayWord;
    document.getElementById("hiraText").textContent = hira;

    toggleHiragana();
    loadAnswers();
}

function loadAnswers() {
    const correct = data[currentIndex][2];
    let answers = [correct];

    while (answers.length < 4) {
        const rand = data[Math.floor(Math.random() * total)][2];
        if (rand && !answers.includes(rand)) answers.push(rand);
    }

    answers.sort(() => Math.random() - 0.5);

    const ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    answers.forEach(a => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = a;
        btn.onclick = () => checkAnswer(btn, a);
        ansDiv.appendChild(btn);
    });


}

function checkAnswer(btn, answer) {
    const correct = data[currentIndex][2];
    document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);

    if (answer === correct) {
        btn.classList.add('correct');
        correctCount++;
    } else {
        btn.classList.add('wrong');
        wrongCount++;
        document.querySelectorAll('.answer-btn').forEach(b => {
            if (b.textContent === correct) b.classList.add('correct');
        });
    }
}

function nextQuestion() { updateQuestion(); }

window.onload = function() {
    const first = document.querySelector('.nav-item');
    if (first) loadLesson(26, first);
};


function drawResultChart(){
 const canvas=document.getElementById('resultChart');
 if(!canvas) return;
 const ctx=canvas.getContext('2d');
 const totalAnswer=correctCount+wrongCount;
 const ratio=totalAnswer?correctCount/totalAnswer:0;
 const cx=110,cy=110,r=90;
 ctx.clearRect(0,0,220,220);
 ctx.beginPath();ctx.moveTo(cx,cy);ctx.fillStyle='#98f1d1';
 ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*ratio);ctx.fill();
 ctx.beginPath();ctx.moveTo(cx,cy);ctx.fillStyle='#ffc38c';
 ctx.arc(cx,cy,r,-Math.PI/2+Math.PI*2*ratio,-Math.PI/2+Math.PI*2);ctx.fill();
 ctx.beginPath();ctx.fillStyle='#fff';ctx.arc(cx,cy,50,0,Math.PI*2);ctx.fill();
 ctx.fillStyle='#333';ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
 ctx.fillText(Math.round(ratio*100)+'%',cx,cy);
}
function showResult(){
 document.getElementById('totalQuestionText').textContent=total;
 document.getElementById('correctCountText').textContent=correctCount;
 document.getElementById('wrongCountText').textContent=wrongCount;
 document.getElementById('resultPopup').style.display='flex';
 drawResultChart();
}

    </div>
    <div class="total-question">Tổng số câu hỏi: <strong id="totalQuestionText">0</strong></div>
    <canvas id="resultChart" width="220" height="220"></canvas>
  </div>

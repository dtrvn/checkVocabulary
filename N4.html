<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N4 – Bài 26–50 Quiz</title>

<style>
    * { box-sizing: border-box; }

    body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f6f7fb;
        margin: 0;
        padding: 0;
        display: flex;
        overflow-x: hidden;
    }

    /* ============================
       PC VIEW
    ============================ */
    .pc-view { display: block; }
    .mobile-view { display: none; }

    /* ============================
       SIDEBAR – PC
    ============================ */
    .sidebar {
        width: 180px;
        background: #ffffff;
        border-right: 2px solid #e0e0e0;
        padding: 8px 0;
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        overflow-y: auto;
    }

    .sidebar h3 {
        font-size: 15px;
        margin: 0 0 8px 0;
        padding: 0 12px;
        color: #333;
        font-weight: 600;
    }

    .nav-item {
        padding: 6px 12px;
        font-size: 14px;
        cursor: pointer;
        border-bottom: 1px solid #eee;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .nav-item:hover {
        background: #eef3ff;
    }

    .nav-item.active {
        background: #4a6cf7;
        color: white;
        font-weight: 600;
    }

    .nav-icon {
        width: 6px;
        height: 6px;
        background: #4a6cf7;
        border-radius: 50%;
    }

    .nav-item.active .nav-icon {
        background: white;
    }

    .container {
        width: calc(100% - 200px);
        padding: 40px;
        margin-left: 200px;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    .progress {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 20px;
        color: #4a6cf7;
        text-align: center;
    }

    .question-box {
        padding: 20px;
        background: #eef3ff;
        border-left: 6px solid #4a6cf7;
        border-radius: 10px;
        margin-bottom: 20px;
    }

    .kanji {
        font-size: 28px;
        font-weight: 700;
        color: #2c3e50;
    }

    .hiragana {
        font-size: 20px;
        margin-top: 8px;
        color: #4a6cf7;
        display: none;
    }

    .answers-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .answer-btn {
        width: 100%;
        padding: 18px;
        font-size: 18px;
        border-radius: 12px;
        border: 2px solid #dce1eb;
        background: white;
        cursor: pointer;
        transition: 0.2s;
    }

    .answer-btn:hover {
        background: #f0f3ff;
        border-color: #4a6cf7;
    }

    .correct { background: #d4f8d4 !important; border-color: #2ecc71 !important; }
    .wrong   { background: #ffd6d6 !important; border-color: #e74c3c !important; }

    #nextBtn {
        width: 100%;
        padding: 15px;
        margin-top: 20px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background: #4a6cf7;
        color: white;
        cursor: pointer;
    }

    /* ============================
       POPUP KẾT QUẢ
    ============================ */
    .result-popup{
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.45);
        justify-content:center;
        align-items:center;
        z-index:9999;
    }
    .result-box{
        background:#fff;
        width:420px;
        max-width:90%;
        border-radius:20px;
        padding:24px;
        text-align:center;
    }
    .result-summary{
        display:flex;
        gap:12px;
        margin:20px 0;
    }
    .stat{
        flex:1;
        padding:12px;
        border-radius:12px;
    }
    .correct-stat{background:#98f1d1;}
    .wrong-stat{background:#ffc38c;}

    /* ============================
       MOBILE VIEW – APP STYLE
    ============================ */
    @media (max-width: 768px) {

        body { display: block; }

        .pc-view { display: none; }
        .mobile-view { display: block; }

        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            left: -220px;
            top: 0;
            background: white;
            transition: 0.3s ease;
            z-index: 9999;
            border-right: 2px solid #ddd;
        }

        .sidebar.open {
            left: 0;
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 9998;
        }

        #overlay.show {
            display: block;
        }

        #menuBtn {
            font-size: 32px;
            padding: 10px;
            cursor: pointer;
            color: #4a6cf7;
        }

        .mobile-view {
            padding: 16px;
            margin-left: 0;
            width: 100%;
        }

        .mobile-title {
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
            color: #4a6cf7;
        }

        .mobile-question {
            background: #eef3ff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            word-wrap: break-word;
        }

        .mobile-answers button {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            font-size: 18px;
            border-radius: 12px;
            border: 2px solid #dce1eb;
            background: white;
            white-space: normal;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .mobile-next {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            background: #4a6cf7;
            color: white;
            border: none;
            border-radius: 12px;
            margin-top: 10px;
        }
    }
</style>
</head>

<body>

<div id="overlay"></div>

<div class="sidebar" id="sidebar">
    <h3>Danh sách bài</h3>
    <div id="lessonList"></div>
</div>

<div class="pc-view">
    <div class="container">
        <h2 id="title">JLPT N4 – Bài 26</h2>
        <div class="progress" id="progressText">0 / 0</div>

        <label class="toggle">
            <input type="checkbox" id="showHira" onchange="toggleHiragana()"> Hiển thị Hiragana
        </label>

        <div class="question-box">
            <div class="kanji" id="kanjiText"></div>
            <div class="hiragana" id="hiraText"></div>
        </div>

        <div id="answers" class="answers-grid"></div>

        <button id="nextBtn" onclick="nextQuestion()">Next</button>
    </div>
</div>

<div class="mobile-view">
    <div id="menuBtn">≡</div>
    <div class="mobile-title" id="m-title">JLPT N4 – Bài 26</div>
    <div class="mobile-question" id="m-question"></div>
    <div class="mobile-answers" id="m-answers"></div>
    <button class="mobile-next" onclick="nextQuestion()">Next</button>
</div>

<div id="resultPopup" class="result-popup">
  <div class="result-box">
    <h2>KẾT QUẢ</h2>
    <div class="result-summary">
      <div class="stat correct-stat"><span>✓ Đúng</span><strong id="correctCountText">0</strong></div>
      <div class="stat wrong-stat"><span>✕ Sai</span><strong id="wrongCountText">0</strong></div>
    </div>
    <div class="total-question">Tổng số câu hỏi: <strong id="totalQuestionText">0</strong></div>
    <canvas id="resultChart" width="220" height="220"></canvas>
  </div>
</div>

<script>
const lessons = {
  "26": [
    ["みます","見ます／診ます","Xem, khám bệnh"],
    ["さがします","探します／捜します","Tìm, tìm kiếm"]
  ],
  "27": [
    ["かいます","飼います","Nuôi ( động vật )"],
    ["たてます","建てます","Xây, xây dựng"]
  ]
};

const lessonListDiv = document.getElementById("lessonList");

for (let i = 26; i <= 50; i++) {
    const div = document.createElement("div");
    div.className = "nav-item";
    div.innerHTML = `<span class="nav-number">${i}</span>`;
    div.onclick = () => loadLesson(i, div);
    lessonListDiv.appendChild(div);
}

let currentLesson = 26;
let data = lessons[currentLesson] || [];
let total = data.length;
let used = new Set();
let currentIndex = null;
let correctCount = 0;
let wrongCount = 0;

function loadLesson(num, element) {
    currentLesson = num;

    document.querySelectorAll(".nav-item").forEach(btn => btn.classList.remove("active"));
    element.classList.add("active");

    data = lessons[num] || [];
    total = data.length;

    used.clear();
    correctCount = 0;
    wrongCount = 0;

    document.getElementById("title").textContent = "JLPT N4 – Bài " + num;
    document.getElementById("m-title").textContent = "JLPT N4 – Bài " + num;
    document.getElementById("progressText").textContent = `0 / ${total}`;

    updateQuestion();
}

function toggleHiragana() {
    document.getElementById("hiraText").style.display =
        document.getElementById("showHira").checked ? "block" : "none";
}

function getRandomQuestion() {
    if (used.size === total) {
        showResult();
        return null;
    }

    let idx;
    do {
        idx = Math.floor(Math.random() * total);
    } while (used.has(idx));

    used.add(idx);
    document.getElementById("progressText").textContent = `${used.size} / ${total}`;
    return idx;
}

function updateQuestion() {
    if (total === 0) {
        document.getElementById("kanjiText").textContent = "Chưa có dữ liệu bài này";
        document.getElementById("m-question").textContent = "Chưa có dữ liệu bài này";
        document.getElementById("answers").innerHTML = "";
        document.getElementById("m-answers").innerHTML = "";
        return;
    }

    currentIndex = getRandomQuestion();
    if (currentIndex === null) return;

    const [hira, kanji] = data[currentIndex];
    const displayWord = kanji.trim() !== "" ? kanji : hira;

    document.getElementById("kanjiText").textContent = displayWord;
    document.getElementById("hiraText").textContent = hira;
    document.getElementById("m-question").textContent = displayWord;

    toggleHiragana();
    loadAnswers();
}

function loadAnswers() {
    const correct = data[currentIndex][2];
    let answers = [correct];

    while (answers.length < 4) {
        const rand = data[Math.floor(Math.random() * total)][2];
        if (rand && !answers.includes(rand)) answers.push(rand);
    }

    answers.sort(() => Math.random() - 0.5);

    const ansDiv = document.getElementById("answers");
    const mAnsDiv = document.getElementById("m-answers");

    ansDiv.innerHTML = "";
    mAnsDiv.innerHTML = "";

    answers.forEach(a => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = a;
        btn.onclick = () => checkAnswer(btn, a);
        ansDiv.appendChild(btn);

        const mBtn = document.createElement("button");
        mBtn.textContent = a;
        mBtn.onclick = () => checkAnswer(mBtn, a);
        mAnsDiv.appendChild(mBtn);
    });
}

function checkAnswer(btn, answer) {
    const correct = data[currentIndex][2];

    document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
    document.querySelectorAll('.mobile-answers button').forEach(b => b.disabled = true);

    if (answer === correct) {
        btn.classList.add('correct');
        correctCount++;
    } else {
        btn.classList.add('wrong');
        wrongCount++;
    }
}

function nextQuestion() { updateQuestion(); }

const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const menuBtn = document.getElementById("menuBtn");

menuBtn.onclick = () => {
    sidebar.classList.add("open");
    overlay.classList.add("show");
};

overlay.onclick = () => {
    sidebar.classList.remove("open");
    overlay.classList.remove("show");
};

function drawResultChart(){
 const canvas=document.getElementById('resultChart');
 if(!canvas) return;
 const ctx=canvas.getContext('2d');
 const totalAnswer=correctCount+wrongCount;
 const ratio=totalAnswer?correctCount/totalAnswer:0;
 const cx=110,cy=110,r=90;
 ctx.clearRect(0,0,220,220);
 ctx.beginPath();ctx.moveTo(cx,cy);ctx.fillStyle='#98f1d1';
 ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*ratio);ctx.fill();
 ctx.beginPath();ctx.moveTo(cx,cy);ctx.fillStyle='#ffc38c';
 ctx.arc(cx,cy,r,-Math.PI/2+Math.PI*2*ratio,-Math.PI/2+Math.PI*2);ctx.fill();
 ctx.beginPath();ctx.fillStyle='#fff';ctx.arc(cx,cy,50,0,Math.PI*2);ctx.fill();
 ctx.fillStyle='#333';ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
 ctx.fillText(Math.round(ratio*100)+'%',cx,cy);
}

function showResult(){
 document.getElementById('totalQuestionText').textContent=total;
 document.getElementById('correctCountText').textContent=correctCount;
 document.getElementById('wrongCountText').textContent=wrongCount;
 document.getElementById('resultPopup').style.display='flex';
 drawResultChart();
}

window.onload = function() {
    const first = document.querySelector('.nav-item');
    if (first) loadLesson(26, first);
};
</script>

</body>
</html>
